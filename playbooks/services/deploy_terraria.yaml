- name: Deploy Terraria Server
  hosts: ceto
  become: yes

  vars_files:
    - ../../secrets.yml

  roles:
    - role: docker_service
      vars:
        service_name: terraria
        compose_template: terraria-compose.yml.j2
        service_directories:
          - path: data
            mode: "0755"
        docker_compose_state: present
