name: Ansible Deploy Services

on:
  push:
    branches:
      - main
    paths:
      - 'playbooks/**'
      - 'templates/**'
      - 'config/**'
      - 'playbook_triggers.yml'
      - '.github/workflows/ansible-deploy.yml'
      - '.github/scripts/compute_matrix.py'

permissions:
  contents: read

jobs:
  detect-changes:
    name: Determine Playbooks to Deploy
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate change detection

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          base_sha: ${{ github.event.before }}
          sha: ${{ github.event.after }}
          json: true

      - name: Compute deploy matrix
        id: compute
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          pip install pyyaml
          python3 .github/scripts/compute_matrix.py

  deploy:
    name: Deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false  # Continue other deployments if one fails
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install ansible

      - name: Install Ansible Galaxy requirements
        run: |
          ansible-galaxy collection install -r requirements.yaml
          ansible-galaxy role install -r requirements.yaml -p ~/.ansible/roles

      - name: Setup SSH for Ansible
        run: |
          mkdir -p secrets
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > secrets/id_ed25519
          chmod 600 secrets/id_ed25519

      - name: Setup Ansible Vault password
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

      - name: Deploy ${{ matrix.name }}
        run: ansible-playbook ${{ matrix.playbook }}

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy]
    if: always()

    steps:
      - name: Check deployment results
        run: |
          echo "Matrix: ${{ needs.detect-changes.outputs.matrix }}"
          echo "Deployment workflow completed"
          echo "Check individual service jobs for details"
